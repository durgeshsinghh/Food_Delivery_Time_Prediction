stages:
  data_cleaning:
    cmd: python src/data/data_cleaning.py
    deps:
    - data/raw/India-Food-Delivery-Time-Prediction.txt
    - src/data/data_cleaning.py
    outs:
    - data/cleaned/Food-Delivery-Time-Prediction_cleaned.csv
  data_preparation:
    cmd: python src/data/data_prepration.py
    params:
    - Data_Preparation.test_size
    - Data_Preparation.random_state
    deps:
    - data/cleaned/Food-Delivery-Time-Prediction_cleaned.csv
    - src/data/data_prepration.py
    outs:
    - data/interim/train.csv
    - data/interim/test.csv
  data_preprocessing:
    cmd: python src/features/data_preprocessing.py
    deps:
    - data/interim/train.csv
    - data/interim/test.csv
    - src/features/data_preprocessing.py
    outs:
    - data/processed/train_trans.csv
    - data/processed/test_trans.csv
    - models/preprocessor.joblib
  train:
    cmd: python src/models/train_model.py
    deps:
    - src/models/train_model.py
    - data/processed/train_trans.csv
    params:
    - Train.Random_Forest
    - Train.LightGBM
    outs:
    - models/model.joblib
    - models/power_transformer.joblib
    - models/stacking_regressor.joblib



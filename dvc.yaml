stages:
  data_cleaning:
    cmd: python src/data/data_cleaning.py
    deps:
    - data/raw/India-Food-Delivery-Time-Prediction.txt
    - src/data/data_cleaning.py
    outs:
    - data/cleaned/Food-Delivery-Time-Prediction_cleaned.csv
  data_preparation:
    cmd: python src/data/data_prepration.py
    params:
    - Data_Preparation.test_size
    - Data_Preparation.random_state
    deps:
    - data/cleaned/Food-Delivery-Time-Prediction_cleaned.csv
    - src/data/data_prepration.py
    outs:
    - data/interim/train.csv
    - data/interim/test.csv

